name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    #this builds locally
    # - name: Build the Docker image
    #   run: docker build -t d20 .

    - name: Log in to Azure
      uses: azure/login@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure Container Registry
      run: az acr login --name jesstamd20acr

    - name: Build image
      run: docker build -t jesstamd20acr.azurecr.io/d20:latest .

    - name: Push image
      run: docker push jesstamd20acr.azurecr.io/d20:latest